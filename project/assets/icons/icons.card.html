<!-- @dsCard group="Brand" viewport="760x360" name="Iconography" subtitle="Phosphor-style glyph set extracted from the Figma file" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 26px; background: var(--tx-bg); }
  .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 10px; }
  .cell { aspect-ratio: 1/1; background: var(--tx-surface); border: 1px solid var(--tx-card-stroke); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: var(--tx-text); box-shadow: var(--tx-shadow-xs); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Icon, ICONS } = window.DesignSystem_83ace9;
function Demo() {
  const names = Object.keys(ICONS);
  return (
    <div className="grid">
      {names.map(n => (
        <div className="cell" key={n} title={n}><Icon name={n} size={24} /></div>
      ))}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
