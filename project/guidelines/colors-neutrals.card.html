<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals & text" subtitle="Canvas, surfaces, borders, and the text ramp" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--tx-surface); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 56px; border-radius: 14px; border: 1px solid var(--tx-border); }
  .nm { font: 700 12px var(--tx-font-ui); color: var(--tx-text-strong); margin-top: 8px; }
  .hex { font: 500 11px var(--tx-font-data); color: var(--tx-text-tertiary); }
  .txt { display:flex; gap:18px; margin-top:14px; align-items:baseline; }
  .txt span { font: 700 18px var(--tx-font-display); }
</style>
</head>
<body>
<div id="tx-back-nav" style="position:fixed;top:16px;left:20px;z-index:9999;">
  <a href="../index.html" style="display:inline-flex;align-items:center;gap:8px;font:600 14px 'Urbanist',system-ui,sans-serif;color:rgb(25,23,23);text-decoration:none;padding:9px 18px 9px 14px;background:rgba(255,255,255,0.92);border:1px solid rgb(227,227,227);border-radius:999px;box-shadow:0 4px 18px rgba(0,0,0,.12);backdrop-filter:blur(12px);transition:box-shadow .15s ease;">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0"><path d="M10 3L5 8l5 5" stroke="rgb(25,23,23)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Back to Docs
  </a>
</div>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--tx-bg)"></div><div class="nm">Canvas</div><div class="hex">rgb(239,239,239)</div></div>
  <div class="sw"><div class="chip" style="background:var(--tx-surface)"></div><div class="nm">Surface</div><div class="hex">#fff</div></div>
  <div class="sw"><div class="chip" style="background:var(--tx-surface-sunken)"></div><div class="nm">Sunken</div><div class="hex">rgb(247,247,247)</div></div>
  <div class="sw"><div class="chip" style="background:var(--tx-border-strong)"></div><div class="nm">Border</div><div class="hex">rgb(165,163,163)</div></div>
</div>
<div class="txt">
  <span style="color:var(--tx-text-strong)">Strong</span>
  <span style="color:var(--tx-text)">Primary</span>
  <span style="color:var(--tx-text-secondary)">Secondary</span>
  <span style="color:var(--tx-text-tertiary)">Tertiary</span>
  <span style="color:var(--tx-text-disabled)">Disabled</span>
</div>
</body>
</html>
