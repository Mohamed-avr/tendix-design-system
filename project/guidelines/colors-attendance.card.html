<!-- @dsCard group="Colors" viewport="700x150" name="Attendance status" subtitle="Present / absent grid tints + status accents" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--tx-surface); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 64px; border-radius: 14px; }
  .nm { font: 700 13px var(--tx-font-ui); color: var(--tx-text-strong); margin-top: 8px; }
  .hex { font: 500 11px var(--tx-font-data); color: var(--tx-text-tertiary); }
</style>
</head>
<body>
<div id="tx-back-nav" style="position:fixed;top:16px;left:20px;z-index:9999;">
  <a href="../index.html" style="display:inline-flex;align-items:center;gap:8px;font:600 14px 'Urbanist',system-ui,sans-serif;color:rgb(25,23,23);text-decoration:none;padding:9px 18px 9px 14px;background:rgba(255,255,255,0.92);border:1px solid rgb(227,227,227);border-radius:999px;box-shadow:0 4px 18px rgba(0,0,0,.12);backdrop-filter:blur(12px);transition:box-shadow .15s ease;">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0"><path d="M10 3L5 8l5 5" stroke="rgb(25,23,23)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Back to Docs
  </a>
</div>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--tx-attend-present-soft)"></div><div class="nm">Present cell</div><div class="hex">soft green</div></div>
  <div class="sw"><div class="chip" style="background:var(--tx-attend-absent-soft)"></div><div class="nm">Absent cell</div><div class="hex">soft red</div></div>
  <div class="sw"><div class="chip" style="background:var(--tx-attend-justified)"></div><div class="nm">Justified</div><div class="hex">rgb(61,110,253)</div></div>
  <div class="sw"><div class="chip" style="background:var(--tx-attend-rejected)"></div><div class="nm">Rejected</div><div class="hex">rgb(230,53,53)</div></div>
  <div class="sw"><div class="chip" style="background:var(--tx-warning-accent)"></div><div class="nm">Doc badge</div><div class="hex">rgb(254,194,63)</div></div>
</div>
</body>
</html>
