<!-- @dsCard group="Colors" viewport="700x150" name="Semantic" subtitle="Success · error · warning · info — solid over soft tint" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--tx-surface); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 64px; border-radius: 14px; display:flex; align-items:flex-end; padding:8px; }
  .dot { width: 26px; height: 26px; border-radius: 8px; }
  .nm { font: 700 13px var(--tx-font-ui); color: var(--tx-text-strong); margin-top: 8px; }
  .hex { font: 500 12px var(--tx-font-data); color: var(--tx-text-tertiary); }
</style>
</head>
<body>
<div id="tx-back-nav" style="position:fixed;top:16px;left:20px;z-index:9999;">
  <a href="../index.html" style="display:inline-flex;align-items:center;gap:8px;font:600 14px 'Urbanist',system-ui,sans-serif;color:rgb(25,23,23);text-decoration:none;padding:9px 18px 9px 14px;background:rgba(255,255,255,0.92);border:1px solid rgb(227,227,227);border-radius:999px;box-shadow:0 4px 18px rgba(0,0,0,.12);backdrop-filter:blur(12px);transition:box-shadow .15s ease;">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0"><path d="M10 3L5 8l5 5" stroke="rgb(25,23,23)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Back to Docs
  </a>
</div>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--tx-success-soft)"><div class="dot" style="background:var(--tx-success)"></div></div><div class="nm">Success</div><div class="hex">rgb(34,197,94)</div></div>
  <div class="sw"><div class="chip" style="background:var(--tx-error-soft)"><div class="dot" style="background:var(--tx-error)"></div></div><div class="nm">Error</div><div class="hex">rgb(255,86,48)</div></div>
  <div class="sw"><div class="chip" style="background:var(--tx-warning-soft)"><div class="dot" style="background:var(--tx-warning)"></div></div><div class="nm">Warning</div><div class="hex">rgb(255,171,0)</div></div>
  <div class="sw"><div class="chip" style="background:var(--tx-info-soft)"><div class="dot" style="background:var(--tx-info)"></div></div><div class="nm">Info</div><div class="hex">rgb(0,184,217)</div></div>
</div>
</body>
</html>
