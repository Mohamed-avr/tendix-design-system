<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="From 8px controls up to fully-pillised — the soft house style" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--tx-surface); }
  .row { display: flex; gap: 18px; align-items: flex-end; }
  .sw { text-align: center; }
  .box { width: 76px; height: 60px; background: var(--tx-accent-soft); border: 1.5px solid var(--tx-accent); }
  .nm { font: 700 12px var(--tx-font-ui); color: var(--tx-text-strong); margin-top: 8px; }
  .v { font: 500 11px var(--tx-font-data); color: var(--tx-text-tertiary); }
</style>
</head>
<body>
<div id="tx-back-nav" style="position:fixed;top:16px;left:20px;z-index:9999;">
  <a href="../index.html" style="display:inline-flex;align-items:center;gap:8px;font:600 14px 'Urbanist',system-ui,sans-serif;color:rgb(25,23,23);text-decoration:none;padding:9px 18px 9px 14px;background:rgba(255,255,255,0.92);border:1px solid rgb(227,227,227);border-radius:999px;box-shadow:0 4px 18px rgba(0,0,0,.12);backdrop-filter:blur(12px);transition:box-shadow .15s ease;">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0"><path d="M10 3L5 8l5 5" stroke="rgb(25,23,23)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Back to Docs
  </a>
</div>
<div class="row">
  <div class="sw"><div class="box" style="border-radius:var(--tx-radius-md)"></div><div class="nm">md</div><div class="v">8px</div></div>
  <div class="sw"><div class="box" style="border-radius:var(--tx-radius-lg)"></div><div class="nm">lg</div><div class="v">12px</div></div>
  <div class="sw"><div class="box" style="border-radius:var(--tx-radius-xl)"></div><div class="nm">xl</div><div class="v">16px</div></div>
  <div class="sw"><div class="box" style="border-radius:var(--tx-radius-2xl)"></div><div class="nm">2xl</div><div class="v">24px</div></div>
  <div class="sw"><div class="box" style="border-radius:var(--tx-radius-3xl)"></div><div class="nm">3xl</div><div class="v">32px</div></div>
  <div class="sw"><div class="box" style="border-radius:var(--tx-radius-pill);width:110px"></div><div class="nm">pill</div><div class="v">9999</div></div>
</div>
</body>
</html>
