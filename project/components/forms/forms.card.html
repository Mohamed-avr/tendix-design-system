<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--tx-bg); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px 28px; align-items: end; }
  .stack { display: flex; flex-direction: column; gap: 16px; }
  .inline { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="tx-back-nav" style="position:fixed;top:16px;left:20px;z-index:9999;">
  <a href="../../index.html" style="display:inline-flex;align-items:center;gap:8px;font:600 14px 'Urbanist',system-ui,sans-serif;color:rgb(25,23,23);text-decoration:none;padding:9px 18px 9px 14px;background:rgba(255,255,255,0.92);border:1px solid rgb(227,227,227);border-radius:999px;box-shadow:0 4px 18px rgba(0,0,0,.12);backdrop-filter:blur(12px);transition:box-shadow .15s ease;">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0"><path d="M10 3L5 8l5 5" stroke="rgb(25,23,23)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Back to Docs
  </a>
</div>
<div id="root"></div>
<script type="text/babel">
const { Input, Select, Checkbox, Switch, Icon } = window.DesignSystem_83ace9;
function Demo() {
  const [m, setM] = React.useState('February');
  return (
    <div className="grid">
      <div className="stack">
        <Input label="Email" placeholder="you@univ-bejaia.dz" startAdornment={<Icon name="Envelope" size={20}/>} />
        <Input label="Password" type="password" defaultValue="••••••••" endAdornment={<Icon name="EyeSlash" size={20}/>} />
      </div>
      <div className="stack">
        <Input label="With error" defaultValue="bad value" error helperText="That matricule doesn't exist." />
        <div>
          <div style={{font:'600 13px var(--tx-font-ui)',color:'var(--tx-text-secondary)',marginBottom:6}}>Month</div>
          <Select value={m} onClick={()=>setM(m==='February'?'March':'February')} fullWidth />
        </div>
      </div>
      <div className="inline">
        <Checkbox checked label="Remember me" />
        <Checkbox indeterminate label="Partial" />
        <Checkbox label="Off" />
      </div>
      <div className="inline">
        <Switch checked label="Notifications" />
        <Switch label="Dark mode" />
        <Switch checked color="success" />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
