  <a href="../../index.html" style="display:inline-flex;align-items:center;gap:8px;font:600 14px 'Urbanist',system-ui,sans-serif;color:rgb(25,23,23);text-decoration:none;padding:9px 18px 9px 14px;background:rgba(255,255,255,0.92);border:1px solid rgb(227,227,227);border-radius:999px;box-shadow:0 4px 18px rgba(0,0,0,.12);backdrop-filter:blur(12px);transition:box-shadow .15s ease;">

<div id="root"></div>
<script type="text/babel">
const { ClassCard, ClassRow, StatusBadge, AttendanceGrid, BottomNav, SettingRow } = window.DesignSystem_83ace9;
function Demo() {
  const [tab, setTab] = React.useState('attendances');
  return (
    <div className="stack">
      <div>
        <div className="lbl">Started class</div>
        <ClassCard />
      </div>
      <div>
        <div className="lbl">History rows</div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <ClassRow running module="OV" status="running" />
          <ClassRow module="Math 5" status="absent" note="Justification Rejected" noteColor="var(--tx-attend-rejected)" />
          <ClassRow module="Physics 3" status="attended" />
          <ClassRow module="OV" status="absent" note="Justified" noteColor="var(--tx-attend-justified)" />
          <ClassRow status="canceled" hasDoc={false} />
        </div>
      </div>
      <div className="row">
        <div>
          <div className="lbl">Status</div>
          <div style={{display:'flex',gap:18,flexWrap:'wrap'}}>
            <StatusBadge status="attended"/><StatusBadge status="absent"/><StatusBadge status="canceled"/>
          </div>
        </div>
        <div>
          <div className="lbl">Month grid</div>
          <div style={{width:220}}><AttendanceGrid columns={5} gap={8} /></div>
        </div>
      </div>
      <div>
        <div className="lbl">Bottom navigation</div>
        <div style={{borderRadius:20,overflow:'hidden',maxWidth:440}}><BottomNav value={tab} onChange={setTab} /></div>
      </div>
      <div>
        <div className="lbl">Setting rows</div>
        <div style={{display:'flex',flexDirection:'column',gap:10,maxWidth:440}}>
          <SettingRow label="Notifications" />
          <SettingRow label="Privacy And Security" />
          <SettingRow label="Log Out" danger trailingIcon="SignOut" />
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
