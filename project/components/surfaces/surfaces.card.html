  <a href="../../index.html" style="display:inline-flex;align-items:center;gap:8px;font:600 14px 'Urbanist',system-ui,sans-serif;color:rgb(25,23,23);text-decoration:none;padding:9px 18px 9px 14px;background:rgba(255,255,255,0.92);border:1px solid rgb(227,227,227);border-radius:999px;box-shadow:0 4px 18px rgba(0,0,0,.12);backdrop-filter:blur(12px);transition:box-shadow .15s ease;">

<div id="root"></div>
<script type="text/babel">
const { Card, Tabs, Pagination, ProgressCircular } = window.DesignSystem_83ace9;
function Demo() {
  const [t, setT] = React.useState('all');
  const [p, setP] = React.useState(4);
  return (
    <div>
      <div className="row">
        <Card style={{width:240}}>
          <div style={{font:'700 18px var(--tx-font-display)',color:'var(--tx-text-strong)'}}>Card surface</div>
          <div style={{font:'400 14px var(--tx-font-ui)',color:'var(--tx-text-tertiary)',marginTop:6}}>White · 24px radius · soft shadow</div>
        </Card>
        <Card inset style={{width:240}}>
          <div style={{font:'700 16px var(--tx-font-display)',color:'var(--tx-text-strong)'}}>Inset row</div>
          <div style={{font:'400 13px var(--tx-font-ui)',color:'var(--tx-text-tertiary)',marginTop:4}}>Sunken grey, no shadow</div>
        </Card>
        <div style={{display:'flex',gap:16,alignItems:'center'}}>
          <ProgressCircular value={72} />
          <ProgressCircular />
        </div>
      </div>
      <div className="row" style={{gap:32}}>
        <Tabs value={t} onChange={setT} items={[{value:'all',label:'All'},{value:'present',label:'Present'},{value:'absent',label:'Absent'}]} />
        <Tabs variant="pill" value={t} onChange={setT} items={[{value:'all',label:'Month'},{value:'present',label:'Week'},{value:'absent',label:'Day'}]} />
      </div>
      <div className="row"><Pagination count={5} page={p} onChange={setP} /></div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
